<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ĐẶT BÀN - PHỞ CỒ NAM ĐỊNH</title>

<style>

html{
    scroll-behavior: smooth;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

/* ===== HEADER ===== */
#d1{
    position:relative;
    height:50vw;
    background-image:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('pho-6760890_1280.jpg');
    background-size:cover;
    background-position:center;
}

/* logo */
.logo{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
}

/* search */
.search-box{
    position:absolute;
    top:15px;
    right:8%;
    padding:10px 20px;
    border-radius:20px;
    border:none;
}

/* menu */
.menu-box{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    padding:10px 30px;
    border-radius:50px;
    background:rgba(255,255,255,0.9);
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.menu{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:30px;
    font-family:Georgia, 'Times New Roman', Times, serif;
}

.menu a{
    font-weight:bold;
    text-decoration:none;
    color:black;
    transition:0.3s;
}

.menu a:hover{
    color:#e67e22;
    transform:translateY(-3px);
}

/* button */
.btn{
    background:#e67e22;
    color:#fff;
    padding:10px 20px;
    border-radius:25px;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    background:#cf711f;
}

/* dropdown */
.dropdown{
    position: relative;
}

.dropdown-menu{
    position: absolute;
    top: 120%;
    left: 0;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    padding: 10px 0;
    min-width: 180px;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s;
}

.dropdown-menu a{
    display:block;
    padding:10px 20px;
    color:#333;
}

.dropdown-menu a:hover{
    background:#e67e22;
    color:white;
}

.dropdown:hover .dropdown-menu{
    opacity:1;
    visibility:visible;
}

/* text */
.text{
    position:absolute;
    top:75px;
    left:50%;
    transform:translate(-50%,-50%);
}

.text p{
    margin:0;
    color:#c75619;
    font-weight:bold;
    font-size:20px;
}

/* arrows */
.arrow{
    position:absolute;
    bottom:0;
    animation:float 5s infinite ease-in-out;
}

@keyframes float{
    50%{ transform:translateY(-10px); }
}

.arrow1{ width:30%; right:35%; }
.arrow2{ width:15%; right:18%; }
.arrow3{ width:15%; left:18%; }
.arrow4{ width:12%; right:4%; }
.arrow5{ width:12%; left:4%; }
/* ===== DAT BAN SECTION ===== */

.booking-section{
    background:#f5f5f5;
    padding:60px 0;
    display:flex;
    justify-content:center;
}

.booking-container{
    width:85%;
    display:flex;
    gap:40px;
    align-items:center;
}

/* left image */
.booking-left{
    width:45%;
    display:flex;
    justify-content:center;
}

.circle-image{
    width:450px;
    height:450px;
    border-radius:50%;
    background:#ddd;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* bạn chỉ cần dán link ảnh vào đây */
.circle-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* right form */
.booking-right{
    width:55%;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.booking-right h2{
    margin-bottom:20px;
}

/* form grid */
.form-row{
    display:flex;
    gap:20px;
    margin-bottom:15px;
}

.form-group{
    flex:1;
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:5px;
    font-weight:bold;
}

.form-group input,
.form-group textarea,
.form-group select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

textarea{
    resize:none;
}

/* button */
.book-btn{
    width:100%;
    padding:12px;
    background:#e67e22;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.book-btn:hover{
    background:#cf711f;
}
</style>
</head>

<body>

<div id="d1">

    <img class="logo" src="https://icolor.vn/wp-content/uploads/2024/09/Logo-quan-pho-7.jpg" width="90">

    <input class="search-box" type="text" placeholder="Tìm món...">

    <div class="menu-box">
        <div class="menu">

            <a href="JS03_13.html">TRANG CHỦ</a>

            <a href="../JS03_13.html">TRANG CHỦ</a>

            <div class="dropdown">
                <a href="thucdon.html">THỰC ĐƠN</a>
                <div class="dropdown-menu">
                    <a href="thucdon.html#pho">CÁC MÓN PHỞ</a>
                    <a href="thucdon.html#my">CÁC MÓN MÌ</a>
                    <a href="thucdon.html#comrang">CƠM RANG</a>
                    <a href="thucdon.html#nuoc">NƯỚC UỐNG</a>
                </div>
            </div>

            <a href="uudai.html">ƯU ĐÃI</a>

            <a href="danhgia.html">ĐÁNH GIÁ</a>

            <a href="datban.html" class="btn">Đặt bàn</a>

        </div>
    </div>
</div>
    <div class="text">
        <p>PHỞ CỒ NAM ĐỊNH</p>
    </div>

    <img class="arrow arrow1" src="arrow1.png">
    <img class="arrow arrow2" src="arrow2.png">
    <img class="arrow arrow3" src="arrow3.png">
    <img class="arrow arrow4" src="aroww4.png">
    <img class="arrow arrow5" src="arrow5.png">

</div>
<div class="booking-section">

    <div class="booking-container">

        <!-- LEFT IMAGE -->
        <div class="booking-left">

            <div class="circle-image">

               
                <img src="logoo.jpg" alt="">

            </div>

        </div>

        <!-- RIGHT FORM -->
        <div class="booking-right">

            <h2>Đặt bàn</h2>

            <div class="form-row">
                <div class="form-group">
                    <label>Họ tên</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Số người</label>
                    <input type="number">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email">
                </div>

                <div class="form-group">
                    <label>Ngày</label>
                    <input type="date">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Điện thoại</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Thời gian</label>
                    <input type="time">
                </div>
            </div>

            <div class="form-group">
                <label>Ghi chú</label>
                <textarea rows="4"></textarea>
            </div>

            <br>

            <button class="book-btn">
                Đặt bàn ngay
            </button>

        </div>

    </div>

</div>

</body>
</html>
