<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUÁN PHỞ CỒ NAM ĐỊNH</title>

<style>
html{
    scroll-behavior: smooth;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

/* ===== HEADER (#d1) ===== */
#d1{
    position:relative;
    height:50vw;
    background-image:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('pho-6760890_1280.jpg');
    background-size:cover;
    background-position:center;
}

/* logo */
.logo{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
}

/* search */
.search-box{
    position:absolute;
    top:15px;
    right:8%;
    padding:20px 20px;
    border-radius:20px;
    border:none;
}

/* menu */
.menu-box{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    padding:10px 30px;
    border-radius:50px;
    background:rgba(255,255,255,0.9);
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    transition: all 0.4s ease;
}

.menu-box.fixed{
    position:fixed;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    border-radius:0;
    z-index:9999;
    animation: slideDown 0.4s ease;
}

.menu{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:30px;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

.menu a{
    margin:0;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    text-decoration:none;
    color:black;
    display:inline-block;
    font-family: Georgia, 'Times New Roman', Times, serif;
}

.menu a:hover{
    color:#e67e22;
    transform:translateY(-5px);
}

/* button */
.btn{
    background:#e67e22;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    transition:0.15s;
}

.btn:hover{ 
    background:#cf711f; 
}

.btn:active,
.order-submit:active{
    transform:scale(1.2);
}

/* text */
.text{
    position:absolute;
    top:75px;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

.text p{
    margin:0;
    color:#c75619;
    font-weight:bold;
    animation:nhay 1s infinite;
}

/* arrows */
.arrow{
    position:absolute;
    bottom:0;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    animation:float 5s infinite ease-in-out;
}

@keyframes float{
    50%{ transform:translateY(-10px); }
}

.arrow1{ width:30%; right:35%; animation-duration:4s; }
.arrow2{ width:15%; right:18%; animation-duration:5s; }
.arrow3{ width:15%; left:18%; animation-duration:6s; }
.arrow4{ width:12%; right:4%; animation-duration:4.5s; }
.arrow5{ width:12%; left:4%; animation-duration:5.5s; }

/* ===== MENU FOOD ===== */
#menu-food{
    padding:80px 5%;
    text-align:center;
    background-image:url("white2.avif");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.menu-title{
    font-size:40px;
    margin-bottom:50px;
    color:#5a2c0f;
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}

.food-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:30px;
}

.food-card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    transition:0.35s;
}

.food-card:hover{
    transform:translateY(-12px) scale(1.02);
    box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.food-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.food-card p,
.food-card h3,
.food-card label{
    font-family:Georgia, 'Times New Roman', Times, serif;
}

.food-info{
    padding:20px;
}

.food-info h3{
    margin:10px 0;
}

.food-info p{
    margin:0;
    color:#c0392b;
    font-weight:bold;
}

.food-info label{
    display:block;
    margin-top:10px;
}

/* ===== GIỚI THIỆU ===== */
#gioithieu{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:100px 0;
    background-image:url("ảnh xám.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}
.intro-img{
    width:80%;    
    height:50%;  
    object-fit:cover; 
    border-radius:20px;
    box-shadow:0 50px 50px rgba(0,0,0,0.3);
    transition:0.4s;
    border:5px solid rgba(255,255,255,0.8);
}

.intro-img:hover{
    transform:scale(1.03);
    box-shadow:0 70px 70px rgba(0,0,0,0.5);
}
.floating-icons{
    position:fixed;
    right:20px;
    bottom:50%;
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:9999;
}

.icon{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#fff;
    padding:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
    cursor:pointer;
    transition:0.3s;
}

.icon:hover{
    transform:scale(1.1);
}
.slider{
    width:100%;
    height:400px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

.slides{
    display:flex;
    gap:30px;
    transition:0.5s;
}

.slide{
    width:300px;
    height:200px;
    transition:0.5s;
    opacity:0.5;
    transform:scale(0.8) rotateY(20deg);
}

.slide img{
    width:100%;
    height:100%;
    border-radius:15px;
    object-fit:cover;
}

/* ảnh giữa */
.slide.active{
    width:450px;
    height:280px;
    opacity:1;
    transform:scale(1) rotateY(0deg);
}
/* chữ VIDEO */
.VIDEO{
    text-align:center;
    font-size:40px;
    margin-bottom:40px;
    margin:10px 0 50px;
    color:#5a2c0f;
    font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
}
.video-section{
    padding:80px 0;
    background-image:url("ảnh nền xám 3.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}
/* grid */
.video-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    max-width:1200px;
    margin:auto;
    padding:0 10%;
}
.video-card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.3s;
    text-decoration:none;
    color:inherit;

}

.video-card:hover{
    transform:translateY(-10px) scale(1.03);
}

.video-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.video-card p{
    text-align:center;
    padding:15px;
    font-weight:bold;
    color:#e67e22;
}
#popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

#popup img{
    max-width:80%;
    max-height:80%;
    border-radius:15px;
}
</style>
</head>
<body>

<div id="d1">

    <img class="logo" src="https://icolor.vn/wp-content/uploads/2024/09/Logo-quan-pho-7.jpg" width="90px">

    <input class="search-box" type="text" placeholder="Tìm món...">

    <div class="menu-box">
        <div class="menu">
        <a href="#">TRANG CHỦ</a>
        <a href="gioithieu.html">GIỚI THIỆU</a>
        <a href="thucdon.html">THỰC ĐƠN</a>
        <a href="uudai.html">ƯU ĐÃI</a>
        <a href="lienhe.html">LIÊN HỆ</a>
        <a href="danhgia.html">ĐÁNH GIÁ</a>
        <button class="btn">Đặt Món</button>
        </div>
    </div>

    <div class="text">
        <p>PHỞ CỒ NAM ĐỊNH</p>
    </div>

    <img class="arrow arrow1" src="arrow1.png">
    <img class="arrow arrow2" src="arrow2.png">
    <img class="arrow arrow3" src="arrow3.png">
    <img class="arrow arrow4" src="aroww4.png">
    <img class="arrow arrow5" src="arrow5.png">

</div>

</div>

<script>
const menu = document.querySelector(".menu-box");
const menuTop = menu.offsetTop;

window.addEventListener("scroll", function(){
    if(window.scrollY >= menuTop){
        menu.classList.add("fixed");
    } else {
        menu.classList.remove("fixed");
    }
});
</script>
<div class="floating-icons">
    <img src="icon tìmmkieems.jpg" class="icon" onclick="alert('Mở tìm kiếm')">
    <img src="bản đồ.jpg" class="icon" onclick="alert('Mở bản đồ')">

<div class="video-section">

    <div class="video-grid">

</div>
<div id="popup" onclick="closeImage()">
    <img id="popupImg">
</div>
<script>
function openImage(el){
    let img = el.querySelector("img").src;
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popupImg").src = img;
}

function closeImage(){
    document.getElementById("popup").style.display = "none";
}
</script>
</body>
